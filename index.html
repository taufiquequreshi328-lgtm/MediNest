<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medinest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header Section Start -->
    <section id="topHeader">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-2">
                    <div class="medi-logo">
                        <h2>Medi<span>Nest</span></h2>
                    </div>
                </div>
                <div class="col-lg-8">
                    <div class="navbar justify-content-center">
                        <nav>
                            <ul class="d-flex">
                                <li class="active">Home</li>
                                <li>About</li>
                                <li>Department</li>
                                <li>Service</li>
                                <li>Doctor</li>
                                <li>More Pages</li>
                                <li>Contact</li>
                            </ul>
                        </nav>
                    </div>
                </div>
                <div class="col-lg-2">
                    <div class="top-btn">
                        <a href="#">Appointment</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
<!-- Header Section Start -->

<!-- Banner Section Start -->
 <section id="mediBanner">
    <div class="container">
        <div class="row">
            <div class="col-lg-5">
                <div class="bnr-img">
                    <img src="images/staff-8.webp" alt="Staff">
                    <div class="bnr-img-card">
                        <div class="bnr-card-content pos-card d-flex align-items-center">
                            <i class="bi bi-telephone-fill"></i>
                            <div class="card-text d-flex flex-column px-3">
                                <span>24/7 Emergency</span>
                                <span>+1 (555) 911-2468</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
 </section>
<!-- Banner Section End -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<script src="js/custom.js"></script>
</body>
</html>
